name: app
description: "U-Skill Wiki"
publish_to: "none"

version: 0.1.0

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  gap: ^3.0.1
  go_router: ^17.3.0
  get_it: ^9.2.1
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.1
  dio: ^5.9.2
  flutter_riverpod: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  fonts:
    - family: Source Sans Pro
      fonts:
        - asset: fonts/source_sans_pro/SourceSansPro-Black.ttf
          weight: 900
        - asset: fonts/source_sans_pro/SourceSansPro-BlackItalic.ttf
          weight: 900
          style: italic

        - asset: fonts/source_sans_pro/SourceSansPro-Bold.ttf
          weight: 700
        - asset: fonts/source_sans_pro/SourceSansPro-BoldItalic.ttf
          weight: 700
          style: italic

        - asset: fonts/source_sans_pro/SourceSansPro-SemiBold.ttf
          weight: 600
        - asset: fonts/source_sans_pro/SourceSansPro-SemiBoldItalic.ttf
          weight: 600
          style: italic

        - asset: fonts/source_sans_pro/SourceSansPro-Regular.ttf
          weight: 400
        - asset: fonts/source_sans_pro/SourceSansPro-Italic.ttf
          weight: 400
          style: italic

        - asset: fonts/source_sans_pro/SourceSansPro-Light.ttf
          weight: 300
        - asset: fonts/source_sans_pro/SourceSansPro-LightItalic.ttf
          weight: 300
          style: italic

        - asset: fonts/source_sans_pro/SourceSansPro-ExtraLight.ttf
          weight: 200
        - asset: fonts/source_sans_pro/SourceSansPro-ExtraLightItalic.ttf
          weight: 200
          style: italic
  # fonts:
